# Build + deploy the SOMA docs site (Astro Starlight) to GitHub Pages.
#
# Triggers: pushes to soma/phase-* branches that touch the docs source or
# the docs-site itself, plus manual dispatch.
#
# One-time repo setup: Settings → Pages → Source = "GitHub Actions". The
# workflow runs successfully whether or not Pages is enabled, but the
# deploy step only goes live once the source is set.

name: Deploy docs site

on:
  push:
    branches:
      - main
      - 'soma/phase-**'
    paths:
      - 'docs/wiki/**'
      - 'docs-site/**'
      - '.github/workflows/docs-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install dependencies
        working-directory: docs-site
        run: npm ci

      - name: Build site
        working-directory: docs-site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
